<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StudyRoom Page View Status Sample</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8f5ec;
      --text: #24302f;
      --muted: #6d7a77;
      --panel: #fffdf7;
      --line: #d7cec0;
      --shadow: rgba(58, 65, 62, .14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,255,255,0) 260px),
        var(--bg);
      color: var(--text);
      font-family: "Yu Gothic", "Meiryo", system-ui, sans-serif;
    }

    main {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 48px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    p {
      margin: 10px 0 24px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
      align-items: start;
    }

    .sample {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px;
      background: var(--panel);
      box-shadow: 0 10px 28px var(--shadow);
    }

    .sample-title {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 700;
      color: #34413f;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <main>
    <h1>授業ページ表示回数 画像サンプル</h1>
    <p>
      StudyRoomの入室状況画像とは別情報であることが伝わるように、青緑・紺・紫系と指定色ベースの案を並べています。
      実装時は科目名と授業回、24時間・7日間の表示回数を差し替える想定です。
    </p>

    <section class="grid" aria-label="授業ページ表示回数の画像サンプル">
      <article class="sample">
        <h2 class="sample-title">案A: 青緑系</h2>

          <rect width="420" height="136" rx="15" fill="#eef8f4"/>
          <rect x="1.5" y="1.5" width="417" height="133" rx="14" fill="none" stroke="#6aa99b" stroke-width="3"/>
          <rect x="16" y="14" width="388" height="34" rx="9" fill="#2f8f83"/>
          <text x="28" y="37" font-family="Yu Gothic, Meiryo, sans-serif" font-size="18" font-weight="700" fill="#f7fffc">@ROOM ページ表示</text>
          <text x="28" y="70" font-family="Yu Gothic, Meiryo, sans-serif" font-size="17" font-weight="700" fill="#173c38">情報基礎A・B 第1回</text>
          <rect x="28" y="84" width="172" height="30" rx="8" fill="#d7efe8"/>
          <rect x="214" y="84" width="172" height="30" rx="8" fill="#d7efe8"/>
          <text x="44" y="104" font-family="Yu Gothic, Meiryo, sans-serif" font-size="15" font-weight="700" fill="#225e57">24時間: 5回表示</text>
          <text x="230" y="104" font-family="Yu Gothic, Meiryo, sans-serif" font-size="15" font-weight="700" fill="#225e57">7日間: 32回表示</text>
          <text x="392" y="126" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#5c7b75">Updated: 2026-07-14 10:30</text>
        </svg>
      </article>

      <article class="sample">

          <rect width="420" height="136" rx="15" fill="#f0f4fb"/>

      <article class="sample">
        <h2 class="sample-title">案F: 数値強調レイアウト</h2>

  </main>
